services:
  opensec:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "${OPENSEC_APP_PORT:-8000}:8000"
    volumes:
      - opensec-data:/data
    environment:
      # App
      - OPENSEC_APP_PORT=8000
      # AI model — set your provider key
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Credential vault (base64-encoded 32-byte key)
      - OPENSEC_CREDENTIAL_KEY=${OPENSEC_CREDENTIAL_KEY:-}
      # Data
      - OPENSEC_DATA_DIR=/data
      # Demo mode — seed sample findings on first run
      # - OPENSEC_DEMO=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  opensec-data:
