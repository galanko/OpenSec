<style>
  body { font-family: 'Inter', sans-serif; margin: 0; }

  /* Spinner reused across running states (PRD-0004 inheritance) */
  .spinner { width: 14px; height: 14px; border-radius: 9999px; border: 2px solid rgba(77,68,227,0.3); border-top-color: #4d44e3; animation: spin 0.9s linear infinite; display: inline-block; }

  @keyframes spin { to { transform: rotate(360deg); } }

  @keyframes pulse-subtle { 0%,100% { opacity: 1; } 50% { opacity: 0.65; } }
  .animate-pulse-subtle { animation: pulse-subtle 2.4s ease-in-out infinite; }

  @media (prefers-reduced-motion: reduce) {

  /* Grade ring */
